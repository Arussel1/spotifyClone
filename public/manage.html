<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Clone</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav>
        <a href="/" class="logo">
            <i class="fab fa-spotify"></i>
            <span>Spotify</span>
        </a>
        <a href="/"><i class="fas fa-home"></i> Home</a>
        <a href="/add.html"><i class="fas fa-plus"></i> Add Track</a>
        <a href="/manage.html" class="active"><i class="fas fa-cog"></i> Manage Library</a>
    </nav>

    <main>
        <header>
            <h1>Manage Your Library</h1>
        </header>
        
        <table id="manageTable">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Title</th>
                    <th>Artist</th>
                    <th>Album</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="songTableBody">
            </tbody>
        </table>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetchSongs();
        });

        async function fetchSongs() {
            const tbody = document.getElementById('songTableBody');
            try {
                const response = await fetch('/api/songs');
                const songs = await response.json();
                
                tbody.innerHTML = songs.map((song, index) => `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${song.title}</td>
                        <td>${song.artist}</td>
                        <td>${song.album}</td>
                        <td>
                            <button class="btn btn-delete" onclick="deleteSong(${song.id})">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                tbody.innerHTML = '<tr><td colspan="5">Error loading songs.</td></tr>';
            }
        }

        async function deleteSong(id) {
            if (!confirm('Are you sure you want to delete this song?')) return;

            try {
                const response = await fetch(`/api/songs/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    fetchSongs();
                } else {
                    alert('Error deleting song.');
                }
            } catch (error) {
                alert('Connection error.');
            }
        }
    </script>
</body>
</html>
